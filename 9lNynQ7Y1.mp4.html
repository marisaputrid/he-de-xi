<style>
:root {
  --primary-bg: #101014;
  --footer-bg: #18181e;
  --text-main: #fff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

  background: var(--primary-bg);
  color: var(--text-main);
  font-family: Arial, sans-serif;
}

/* ========================= */
/* BANNER ATAS FIXED */

.top-ad {

  padding: 6px 0;
  z-index: 999;
  border-radius: 8px;
}

/* ========================= */
/* CONTAINER */
/* ========================= */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 150px; 
  padding-bottom: 90px; /* ruang supaya video tidak ketutup banner bawah */
}

/* ========================= */
/* VIDEO */
/* ========================= */
video {
  height: 95vh;
  width: auto;
  max-width: 100%;
  object-fit: contain;
  background: #000;
}

/* Hilangkan fullscreen button */
video::-webkit-media-controls-fullscreen-button {
  display: none !important;
}

/* ========================= */
/* BANNER BAWAH FIXED */
/* ========================= */

  bottom: 0;
  left: 0;
  width: 100%;
  text-align: center;
  background: var(--footer-bg);
  padding: 10px 0;
  z-index: 999;
  border-radius: 8px 8px 0 0;
